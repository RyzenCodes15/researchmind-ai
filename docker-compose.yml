services:
  postgres:
    image: pgvector/pgvector:pg16
    container_name: researchmind-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-researchmind}
      POSTGRES_USER: ${POSTGRES_USER:-researchmind}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-researchmind}
    ports:
      - "${POSTGRES_PORT:-5434}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./docker/postgres/init:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-researchmind} -d ${POSTGRES_DB:-researchmind}"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    container_name: researchmind-backend
    restart: unless-stopped
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload
    environment:
      APP_NAME: ResearchMind AI
      APP_DESCRIPTION: AI research assistant built with FastAPI and RAG
      APP_VERSION: 0.1.0
      API_V1_PREFIX: /api/v1
      POSTGRES_HOST: postgres
      POSTGRES_PORT: 5432
      POSTGRES_USER: ${POSTGRES_USER:-researchmind}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-researchmind}
      POSTGRES_DB: ${POSTGRES_DB:-researchmind}
      DATABASE_URL: postgresql+psycopg://${POSTGRES_USER:-researchmind}:${POSTGRES_PASSWORD:-researchmind}@postgres:5432/${POSTGRES_DB:-researchmind}
      BACKEND_CORS_ORIGINS: http://localhost:3000
      DOCUMENT_STORAGE_PATH: /app/storage
      MAX_UPLOAD_SIZE_MB: 50
      CHUNK_SIZE: 1000
      CHUNK_OVERLAP: 200
      EMBEDDING_MODEL_NAME: BAAI/bge-small-en-v1.5
      EMBEDDING_DIMENSION: 384
      EMBEDDING_BATCH_SIZE: 32
      GEMINI_MODEL_NAME: ${GEMINI_MODEL_NAME:-gemini-2.5-flash}
      CHAT_TOP_K: ${CHAT_TOP_K:-5}
      CHAT_MIN_SIMILARITY: ${CHAT_MIN_SIMILARITY:-0.2}
    env_file:
      - .env.secrets
    volumes:
      - ./backend:/app
      - backend_uploads:/app/storage
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "python -c \"import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/health').read()\"",
        ]
      interval: 10s
      timeout: 5s
      retries: 5

  frontend:
    build:
      context: .
      dockerfile: frontend/Dockerfile
    container_name: researchmind-frontend
    restart: unless-stopped
    command: npm run dev -- --hostname 0.0.0.0 --port 3000
    environment:
      NEXT_PUBLIC_API_BASE_URL: http://localhost:8000/api/v1
      INTERNAL_API_BASE_URL: http://backend:8000/api/v1
      NEXT_TELEMETRY_DISABLED: "1"
    volumes:
      - ./frontend:/app
      - frontend_node_modules:/app/node_modules
    ports:
      - "3000:3000"
    depends_on:
      backend:
        condition: service_healthy

volumes:
  postgres_data:
  frontend_node_modules:
  backend_uploads: